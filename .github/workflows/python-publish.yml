name: Telegram Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install -r yuklama.txt
    - name: Run bot
      env:
        API: 7768082120:AAGcsU9rpT-eQ2e8w7OpZTW_NTPkEunSYe0
      run: |
        python main.py
